apiVersion: v1
kind: Service
metadata:
  name: {{ include "lilbro-whisper.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lilbro-whisper.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "lilbro-whisper.selectorLabels" . | nindent 4 }}
