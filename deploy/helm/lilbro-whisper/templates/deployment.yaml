apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lilbro-whisper.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lilbro-whisper.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "lilbro-whisper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lilbro-whisper.labels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-server
    spec:
      # NFS compatibility — maps container writes to the 'users' group (GID 100).
      securityContext:
        fsGroup: 100

      containers:
        - name: lilbro-whisper
          image: "{{ .Values.image.repository }}:{{ include "lilbro-whisper.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL

          ports:
            - name: http
              containerPort: 8081
              protocol: TCP

          env:
            # DATABASE_URL sourced from the CNPG-generated credentials secret.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databaseSecret.name | quote }}
                  key: {{ .Values.databaseSecret.key | quote }}
            - name: BOOKS_DIR
              value: {{ .Values.config.booksDir | quote }}
            - name: EMBEDDINGS_BASE_URL
              value: {{ .Values.config.embeddingsBaseURL | quote }}
            - name: EMBEDDINGS_MODEL
              value: {{ .Values.config.embeddingsModel | quote }}
            - name: MCP_HTTP_ADDR
              value: {{ .Values.config.mcpHttpAddr | quote }}
            - name: STALE_JOB_TIMEOUT
              value: {{ .Values.config.staleJobTimeout | quote }}
            - name: CHUNK_SIZE
              value: {{ .Values.config.chunkSize | quote }}

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: books
              mountPath: {{ .Values.config.booksDir }}
              readOnly: true
            # Distroless needs a writable /tmp for runtime scratch space.
            - name: tmp
              mountPath: /tmp

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      volumes:
        - name: books
          persistentVolumeClaim:
            claimName: {{ .Values.booksPvcName | quote }}
            readOnly: true
        - name: tmp
          emptyDir: {}
