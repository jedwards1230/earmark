# MCP HTTP server Deployment.
#
# Runs: lil-whisper mcp (with MCP_TRANSPORT=http)
# Exposes: :8081/mcp    (MCP protocol)
#          :8081/health (liveness — no deps)
#          :8081/readyz (readiness — DB ping)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lilbro-whisper.mcp.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lilbro-whisper.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "lilbro-whisper.mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lilbro-whisper.labels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-server
      annotations:
        {{- include "lilbro-whisper.configChecksum" . | nindent 8 }}
    spec:
      securityContext:
        {{- include "lilbro-whisper.podSecurityContext" . | nindent 8 }}

      containers:
        - name: lilbro-whisper-mcp
          image: "{{ .Values.image.repository }}:{{ include "lilbro-whisper.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          # args overrides the Dockerfile CMD — always explicit, never rely on CMD.
          args: ["mcp"]

          securityContext:
            {{- include "lilbro-whisper.containerSecurityContext" . | nindent 12 }}

          ports:
            - name: http
              containerPort: 8081
              protocol: TCP

          env:
            {{- include "lilbro-whisper.commonEnv" . | nindent 12 }}
            - name: MCP_TRANSPORT
              value: "http"
            - name: MCP_HTTP_ADDR
              value: {{ .Values.config.mcpHttpAddr | quote }}
            {{- if and .Values.secrets.enabled .Values.secrets.controlApiToken.itemPath }}
            # Bearer token for the JSON control API (/api/v1 mutations). Synced from
            # 1Password via the controlApiToken OnePasswordItem. Absent → those
            # endpoints fail closed (503).
            - name: CONTROL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.controlApiToken.name | quote }}
                  key: {{ .Values.secrets.controlApiToken.key | quote }}
            {{- end }}

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            {{- include "lilbro-whisper.volumeMounts" . | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      volumes:
        {{- include "lilbro-whisper.volumes" . | nindent 8 }}
