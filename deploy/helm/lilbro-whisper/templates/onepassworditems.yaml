# OnePasswordItem resources for lilbro-whisper.
#
# Gated by secrets.enabled (default true).
#
# The 1Password Kubernetes Operator syncs these into plain Secrets that the
# Deployments and CNPG Cluster reference by name.
#
# Naming convention (CONTRACT section 2.5 + k8s-standard-patterns.md):
#   k8s-<namespace>-<service>-<type>
{{- if .Values.secrets.enabled }}
---
# DB credentials — consumed by the CNPG Cluster bootstrap secret reference
# AND by the Deployment DATABASE_URL env var.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: lilbro-whisper-pg-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lilbro-whisper.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  itemPath: {{ required "secrets.dbCredentials.itemPath is required" .Values.secrets.dbCredentials.itemPath | quote }}
---
# Garage S3 secret — consumed by the ObjectStore S3 credentials reference.
# Name matches the secret the ObjectStore references (cnpg-garage-secret).
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ required "secrets.garageSecret.name is required" .Values.secrets.garageSecret.name | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lilbro-whisper.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  itemPath: {{ required "secrets.garageSecret.itemPath is required" .Values.secrets.garageSecret.itemPath | quote }}
{{- if .Values.secrets.controlApiToken.itemPath }}
---
# Control-API bearer token — synced to a Secret consumed by the MCP Deployment's
# CONTROL_API_TOKEN env. Item must expose the token under the configured field key
# (default API_TOKEN). Omitted when itemPath is empty (control mutations then 503).
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ .Values.secrets.controlApiToken.name | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lilbro-whisper.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  itemPath: {{ .Values.secrets.controlApiToken.itemPath | quote }}
{{- end }}
{{- if .Values.secrets.absToken.itemPath }}
---
# Audiobookshelf API token — synced to a Secret consumed by the ingest Deployment's
# ABS_TOKEN env (metadata provider "abs"). Item must expose the token under the
# configured field key (default api_token). Omitted when itemPath is empty.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ .Values.secrets.absToken.name | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lilbro-whisper.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
spec:
  itemPath: {{ .Values.secrets.absToken.itemPath | quote }}
{{- end }}
{{- end }}
