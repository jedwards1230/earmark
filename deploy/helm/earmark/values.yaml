image:
  repository: ghcr.io/jedwards1230/earmark
  # tag defaults to Chart.appVersion when unset
  tag: ""
  pullPolicy: IfNotPresent

# ── MCP server ─────────────────────────────────────────────────────────────────
# Replica count for the MCP HTTP deployment only.
# The ingest worker is always 1 replica (Recreate strategy).
mcp:
  replicaCount: 1

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-redirect-lan@kubernetescrd
  host: audiobooks-kb.example.com
  tlsSecretName: audiobooks-kb-tls

# ── Prometheus PodMonitor ───────────────────────────────────────────────────────
# Scrapes /metrics (CONTRACT §2.16) on BOTH pods: the mcp pod's http port (8081)
# and the ingest pod's metrics port (8082). Requires the Prometheus Operator
# (PodMonitor CRD). Disable if your cluster scrapes via a different mechanism.
podMonitor:
  enabled: true
  # interval/scrapeTimeout are standard Prometheus scrape settings.
  interval: 30s
  scrapeTimeout: 10s

# ── Credentials ────────────────────────────────────────────────────────────────
# Existing Secret containing DATABASE_URL (created by the CNPG OnePasswordItem).
# The chart references this secret by name; it does not create it.
databaseSecret:
  # Name of the K8s Secret that holds the DATABASE_URL key.
  name: earmark-pg-credentials
  # Key within the secret that contains the PostgreSQL DSN.
  key: DATABASE_URL

# ── Books NFS PVC ──────────────────────────────────────────────────────────────
# ReadOnlyMany PVC that must already exist in this namespace.
# See CONTRACT.md §2.6 for the static PV + PVC pattern.
booksPvcName: books-ro

# ── Application config ─────────────────────────────────────────────────────────
config:
  # ── Legacy embeddings endpoint (CONTRACT §2.4) ─────────────────────────────
  # EMBEDDINGS_BASE_URL/EMBEDDINGS_MODEL are the deprecated single-endpoint vars.
  # When aiEndpoints (below) is empty, the app synthesizes a `_legacy` embeddings
  # endpoint from these two — which is exactly why the live dashboard shows the
  # endpoint as `_legacy`. Set aiEndpoints + aiRoles to give it a real id.
  embeddingsBaseURL: "http://ollama:11434/v1"
  embeddingsModel: "nomic-embed-text"
  booksDir: "/books"
  mcpHttpAddr: ":8081"
  # ingestHttpAddr is the ingest pod's minimal HTTP listener (/healthz + /metrics).
  # CONTRACT §2.4. The container port + probe are hard-coded to 8082; change both
  # if you change this.
  ingestHttpAddr: ":8082"
  staleJobTimeout: "30m"
  chunkSize: "512"
  # logFormat: "json" emits structured slog JSON (parseable in Loki) on both pods;
  # "pretty" keeps the human-readable handler. CONTRACT §2.4. Default json in K8s.
  logFormat: "json"
  # libraryCollections declares how each library root is shaped so the dashboard
  # derives author/title from configuration rather than a hardcoded path layout.
  # Serialized to the LIBRARY_COLLECTIONS env var (JSON). Empty → generic
  # fallback. Each entry: {root, layout}; layout is slash-delimited segment roles
  # (author/title/series/_) for the directories below root; if "title" is absent,
  # it is parsed from the filename. Example:
  #   libraryCollections:
  #     - {root: audio-libation, layout: author/title}
  #     - {root: audio-libro, layout: author}
  libraryCollections: []

  # asrServers declares the transcription servers (ASR runners) for this
  # deployment, serialized to the ASR_SERVERS env var (JSON) and shown on the
  # Servers dashboard page. Lets a configured-but-idle fallback appear, not just
  # servers already observed. Empty → the page lists only observed runners.
  # Read-only: this does NOT route work — the runner claims jobs itself.
  # Each entry: {name, host?, model?, role?, match?, gpuArbiterUrl?,
  #              family?, runtime?, capabilities?{...bool}, languages?[]}; only
  # name is required. gpuArbiterUrl (a gpu-arbiter /status endpoint) adds live
  # readiness: ready (GPU free) / busy (GPU held by a game) / offline (host
  # unreachable). This is pass-through JSON → the ASR_SERVERS env var; no
  # template logic depends on the fields.
  # Backend descriptor (CONTRACT §2.13, all optional/back-compat):
  #   family       — free-form family id, e.g. nemo-parakeet, whisper
  #   runtime      — free-form runtime id, e.g. nemo-cuda, whisper.cpp-sycl
  #   capabilities — keys from the closed enum (word_timestamps, context_biasing,
  #                  diarization, confidence_scores, language_detection) → bool;
  #                  unknown keys are dropped with a warning
  #   languages    — ISO-639-1 codes the backend supports (omit = unknown)
  #   asrServers:
  #     - {name: gpu-1, host: gpu-1, model: nvidia/parakeet-tdt-0.6b-v3, role: primary, gpuArbiterUrl: "http://gpu-1:48750/status",
  #        family: nemo-parakeet, runtime: nemo-cuda,
  #        capabilities: {word_timestamps: true, context_biasing: false, diarization: false},
  #        languages: [en, es, fr, de]}
  #     - {name: cpu-1, host: cpu-1, role: fallback, family: whisper, runtime: whisper.cpp,
  #        capabilities: {word_timestamps: true}}
  asrServers: []

  # ── AI endpoint registry (CONTRACT §2.14) ──────────────────────────────────
  # aiEndpoints is pass-through JSON → the AI_ENDPOINTS env var (same precedent
  # as asrServers): the set of OpenAI-compatible AI endpoints this deployment
  # talks to. Each entry: {id, type: embeddings|chat, backend: ollama|vllm|
  # openai-compat, baseURL, model, options?{...string}}; id/type/backend/baseURL/
  # model are required by the app's validator.
  #
  # When aiEndpoints is EMPTY (the default), AI_ENDPOINTS/AI_ROLES are omitted and
  # the app synthesizes a `_legacy` embeddings endpoint from embeddingsBaseURL/
  # embeddingsModel above — that legacy fallback is why the dashboard shows
  # `_legacy`. Populate aiEndpoints to give the embeddings endpoint a real id and
  # to register a chat endpoint for the eval layer.
  #
  # aiRoles is pass-through JSON → AI_ROLES, binding roles to endpoint ids:
  # {embeddings: <id>, eval?: <id>}. aiRoles.embeddings is REQUIRED whenever
  # aiEndpoints is non-empty (the chart fails to render otherwise, mirroring the
  # app's fail-closed behavior); eval is optional (omit → no eval layer).
  # Example:
  #   aiEndpoints:
  #     - {id: ollama-embed, type: embeddings, backend: ollama,
  #        baseURL: "http://ollama:11434/v1", model: nomic-embed-text}
  #     - {id: vllm-eval, type: chat, backend: vllm,
  #        baseURL: "http://vllm:8000/v1", model: qwen2.5-7b-instruct}
  #   aiRoles: {embeddings: ollama-embed, eval: vllm-eval}
  aiEndpoints: []
  aiRoles: {}

  # ── Eval-layer chat endpoint (CONTRACT §2.15) ──────────────────────────────
  # Standalone EVAL_CHAT_* vars for internal/eval's read-only LLM judge, for when
  # a chat endpoint (e.g. vLLM) exists but the AI registry isn't wired yet. Each
  # field is emitted only when set; an empty evalChat leaves the eval layer
  # unconfigured (eval is on-demand, so this is fine). apiKey is a plain value
  # passthrough for now — move it to a secret if the endpoint needs a credential.
  #   evalChat: {baseURL: "http://vllm:8000/v1", model: qwen2.5-7b-instruct, apiKey: ""}
  evalChat: {}

  # In-pipeline eval (EVAL_IN_PIPELINE, CONTRACT §2.15): when true, the embed
  # worker runs the eval judge on each transcript's chunks BEFORE embedding,
  # instead of eval being a separate on-demand pass. Cost is bounded by the
  # batch coordinator's run_limit — only enable when running the batched
  # pipeline (CONTRACT §1.4). Default false (eval stays on-demand).
  evalInPipeline: false

  # Strict-linear eval gate (EVAL_GATES_EMBED, CONTRACT §2.15): when true, a
  # transcript is NOT embedded/searchable until the eval judge has reviewed it
  # (transcribe → eval → embed, monotonic). REQUIRES evalInPipeline: true — the
  # gate needs the in-pipeline judge, and the app fail-closes at startup if the
  # gate is on without it (the chart also guards this at render time). Default
  # false (eval is best-effort and does NOT gate embed). Enabling adds GPU cost:
  # every track is judged before becoming searchable.
  evalGatesEmbed: false

  # ── Metadata provider (CONTRACT §2.4) ──────────────────────────────────────
  # METADATA_PROVIDER selects how the ingest monitor derives book metadata:
  #   path           — filesystem path only (default; no external dependency)
  #   abs            — query Audiobookshelf (requires absURL + secrets.absToken)
  #   chain:abs,path — try each left-to-right, first non-empty wins
  # The factory falls back to "path" if ABS is requested but unconfigured.
  metadataProvider: "path"
  # Base URL of the in-cluster Audiobookshelf instance. Required when
  # metadataProvider includes "abs"; ignored otherwise. e.g. http://audiobookshelf.media
  # NOTE: setting absURL REQUIRES secrets.absToken.itemPath — the chart fails to
  # render otherwise (ABS_TOKEN is mandatory when ABS_URL is set; CONTRACT §2.4).
  absURL: ""
  # ABS books library UUID. Empty → the service's built-in default Books library.
  absLibraryID: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Schedule on amd64 nodes only.
nodeSelector:
  kubernetes.io/arch: amd64

tolerations: []

# ── CNPG PostgreSQL cluster ─────────────────────────────────────────────────────
cnpg:
  enabled: true

  # Image: ghcr.io/cloudnative-pg/postgresql:16-standard-bookworm
  # The "standard" flavour ships pgvector (and pgaudit, pg_failover_slots, etc.)
  # on top of the minimal base.  It is the official CNPG upstream recommendation
  # for PG16 clusters that need bundled community extensions.
  #
  # VERIFY before deploy:
  #   docker pull ghcr.io/cloudnative-pg/postgresql:16-standard-bookworm
  # and confirm the operator version in the cluster still supports this imageName.
  # The ImageVolume/spec.postgresql.extensions approach (CNPG Recipe 23) requires
  # PostgreSQL 18 + Kubernetes 1.35 and is NOT used here.
  imageName: ghcr.io/cloudnative-pg/postgresql:16-standard-bookworm

  instances: 1

  storage:
    size: 20Gi
    storageClass: nfs-databases

  # S3-compatible backup store; the real endpoint is supplied by the
  # deploying environment's values (placeholder default below).
  backup:
    garageEndpoint: "http://s3.example.com:3900"
    bucket: "postgres-backups"
    retention: "30d"
    # Six-field cron: daily at 03:00 (CONTRACT §2.5)
    schedule: "0 0 3 * * *"

# ── 1Password OnePasswordItems ──────────────────────────────────────────────────
secrets:
  enabled: true

  # DB credentials for the CNPG cluster (CONTRACT §2.5)
  dbCredentials:
    itemPath: "vaults/example/items/earmark-pg-credentials"

  # Shared Garage S3 secret for CNPG backups (CONTRACT §2.5)
  garageSecret:
    name: cnpg-garage-secret
    itemPath: "vaults/example/items/cnpg-garage-secret"

  # Bearer token for the JSON control API (PUT/POST/DELETE /api/v1/pipeline/*).
  # When itemPath is set, the 1Password item is synced to a Secret and wired to
  # the MCP pod's CONTROL_API_TOKEN env. Leave itemPath empty to omit it — the
  # mutating control endpoints then fail closed (503). `key` is the field label in
  # the 1Password item that holds the token.
  controlApiToken:
    name: earmark-control-api
    key: API_TOKEN
    itemPath: ""

  # Audiobookshelf API bearer token — synced to a Secret consumed by the ingest
  # pod's ABS_TOKEN env (used when config.metadataProvider includes "abs").
  # Leave itemPath empty to omit it — the metadata factory then falls back to the
  # path provider. `key` is the field label in the 1Password item holding the token.
  absToken:
    name: earmark-abs
    key: api_token
    itemPath: ""
