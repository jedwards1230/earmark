# Ingest Deployment — file-watcher + embedding worker.
#
# Runs: earmark monitor
#   - Walks BOOKS_DIR and enqueues new audio files as transcription_jobs.
#   - Polls for completed transcripts, chunks them, calls Ollama, stores embeddings.
#
# Exposes a minimal HTTP listener on :8082 for /healthz (liveness) and /metrics
# (Prometheus). No Service or Ingress — the port is pod-internal (probe + scrape).
# Strategy: Recreate (single writer; only 1 replica meaningful).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "earmark.ingest.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "earmark.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "earmark.ingest.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "earmark.labels" . | nindent 8 }}
        app.kubernetes.io/component: ingest
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "earmark.configChecksum" . | nindent 8 }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      securityContext:
        {{- include "earmark.podSecurityContext" . | nindent 8 }}

      containers:
        - name: earmark-ingest
          image: "{{ .Values.image.repository }}:{{ include "earmark.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          # args overrides the Dockerfile CMD — always explicit, never rely on CMD.
          args: ["monitor"]

          securityContext:
            {{- include "earmark.containerSecurityContext" . | nindent 12 }}

          ports:
            - name: metrics
              containerPort: 8082
              protocol: TCP

          env:
            {{- include "earmark.commonEnv" . | nindent 12 }}
            - name: INGEST_HTTP_ADDR
              value: {{ .Values.config.ingestHttpAddr | quote }}

          # Liveness: HTTP /healthz on the ingest pod's minimal listener (replaces
          # the old `pgrep -f earmark` exec probe, which errored because pgrep is
          # absent from the distroless image).
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            {{- include "earmark.volumeMounts" . | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      volumes:
        {{- include "earmark.volumes" . | nindent 8 }}
