{{/*
Service — routes traffic to the mcp-server Deployment only.
The ingest worker has no HTTP port and is not selected.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "earmark.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "earmark.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "earmark.mcp.selectorLabels" . | nindent 4 }}
