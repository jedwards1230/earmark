# CI — build + test + lint on every push and PR.
# Runs on linux/amd64 with a pure CGO_ENABLED=0 go build.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Display coverage summary
        run: go tool cover -func=coverage.out | tail -1

  python:
    name: Python runner tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        # test_runner.py imports only stdlib + psycopg2 (no torch/NeMo), so the
        # GPU runtime stack is not needed to run the suite.
        run: pip install psycopg2-binary pytest

      - name: Run runner unit tests
        run: python -m pytest runner/test_runner.py -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod

      - name: Run Gosec Security Scanner
        # Install + run via the workflow's Go toolchain rather than the gosec
        # Docker action, whose bundled Go (1.24.x, GOTOOLCHAIN=local) cannot load
        # a module that requires Go 1.25.11.
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.5
          gosec ./...

      - name: Run govulncheck
        env:
          # govulncheck@latest is built with a newer Go than this module pins
          # (go.mod toolchain). Allow fetching the toolchain to build the tool;
          # the scan itself still analyzes the module at its own Go version.
          GOTOOLCHAIN: auto
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    needs: [test, python, lint]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod

      - name: Build binary (linux/amd64)
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w \
              -X 'github.com/jedwards1230/earmark/internal/version.Version=dev' \
              -X 'github.com/jedwards1230/earmark/internal/version.Commit=${COMMIT}' \
              -X 'github.com/jedwards1230/earmark/internal/version.BuildTime=${BUILD_TIME}'" \
            -o earmark-linux-amd64 \
            .

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: earmark-linux-amd64
          path: earmark-linux-amd64
          retention-days: 7

      - name: Write summary
        run: |
          echo "## CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (linux/amd64) | passed |" >> $GITHUB_STEP_SUMMARY

  ci:
    name: CI
    if: always()
    needs: [test, python, lint, security, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=("${{ needs.test.result }}" "${{ needs.python.result }}" "${{ needs.lint.result }}" "${{ needs.security.result }}" "${{ needs.build.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "CI failed"
              exit 1
            fi
          done
          echo "All checks passed"
