# CI — build + test + lint on every push and PR.
# Runs on linux/amd64; the darwin-only guard in scripts/build.sh is bypassed
# here because we use a pure CGO_ENABLED=0 go build, not the Makefile path.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Display coverage summary
        run: go tool cover -func=coverage.out | tail -1

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod

      - name: Run Gosec Security Scanner
        uses: securego/gosec@v2.22.5
        with:
          args: "./..."

      - name: Run govulncheck
        env:
          # govulncheck@latest is built with a newer Go than this module pins
          # (go.mod toolchain). Allow fetching the toolchain to build the tool;
          # the scan itself still analyzes the module at its own Go version.
          GOTOOLCHAIN: auto
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod

      - name: Build binary (linux/amd64)
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w \
              -X 'github.com/jedwards1230/lil-whisper/internal/version.Version=dev' \
              -X 'github.com/jedwards1230/lil-whisper/internal/version.Commit=${COMMIT}' \
              -X 'github.com/jedwards1230/lil-whisper/internal/version.BuildTime=${BUILD_TIME}'" \
            -o lil-whisper-linux-amd64 \
            .

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: lil-whisper-linux-amd64
          path: lil-whisper-linux-amd64
          retention-days: 7

      - name: Write summary
        run: |
          echo "## CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (linux/amd64) | passed |" >> $GITHUB_STEP_SUMMARY
