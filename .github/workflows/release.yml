# Release orchestrator — dispatched manually with a semver label or via push to main.
# Calls release-go.yml and/or release-chart.yml based on inputs.

name: Release

run-name: >-
  Release${{ inputs.release_go && ' Go' || '' }}${{ inputs.release_chart && ' Chart' || '' }}

on:
  # Auto-trigger: PR merged to main with a semver:* label calls this workflow.
  workflow_dispatch:
    inputs:
      # ── Go Server ────────────────────────────────────────────────
      release_go:
        description: "Release Go server image"
        type: boolean
        default: false
      go_bump_type:
        description: "Go version bump"
        type: choice
        options:
          - patch
          - minor
          - major
      go_version_override:
        description: "Go version override (e.g. 1.2.3)"
        required: false
        type: string

      # ── Helm Chart ───────────────────────────────────────────────
      release_chart:
        description: "Release Helm chart"
        type: boolean
        default: false
      chart_bump_type:
        description: "Chart version bump"
        type: choice
        options:
          - patch
          - minor
          - major
      chart_version_override:
        description: "Chart version override (e.g. 0.2.0)"
        required: false
        type: string

  # Callable by auto-release.yml when a PR merged to main carries a semver:*
  # label. workflow_call does not support `type: choice`, so bump types are
  # plain strings here (validated downstream by release-go/release-chart).
  workflow_call:
    inputs:
      release_go:
        type: boolean
        default: false
      go_bump_type:
        type: string
        default: patch
      go_version_override:
        type: string
        default: ""
      release_chart:
        type: boolean
        default: false
      chart_bump_type:
        type: string
        default: patch
      chart_version_override:
        type: string
        default: ""

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # Go release runs first; chart waits so it can auto-detect the new go-v* tag
  # for appVersion.  If Go is skipped, chart runs immediately.
  release-go:
    if: ${{ inputs.release_go }}
    uses: ./.github/workflows/release-go.yml
    with:
      bump_type: ${{ inputs.go_bump_type }}
      version_override: ${{ inputs.go_version_override }}

  release-chart:
    if: ${{ !failure() && !cancelled() && inputs.release_chart }}
    needs: [release-go]
    uses: ./.github/workflows/release-chart.yml
    with:
      bump_type: ${{ inputs.chart_bump_type }}
      version_override: ${{ inputs.chart_version_override }}

  summary:
    if: ${{ always() && !cancelled() }}
    needs: [release-go, release-chart]
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Requested | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Go Server | ${{ inputs.release_go && '✅' || '—' }} | ${{ needs.release-go.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Chart | ${{ inputs.release_chart && '✅' || '—' }} | ${{ needs.release-chart.result }} |" >> $GITHUB_STEP_SUMMARY
