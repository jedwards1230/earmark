name: Generic Release Workflow

on:
    workflow_call:
        inputs:
            new_version:
                description: "The version to release (e.g., v1.2.3)"
                required: true
                type: string
            current_version:
                description: "The current version before this release"
                required: true
                type: string
            changelog_content:
                description: "Content for the release changelog"
                required: true
                type: string
            changelog_artifact_name:
                description: "Name of the changelog artifact to download"
                required: false
                type: string
            draft:
                description: "Create as draft release"
                required: false
                type: boolean
                default: false
            prerelease:
                description: "Mark as prerelease"
                required: false
                type: boolean
                default: false
            create_release:
                description: "Create GitHub release (false for version tracking only)"
                required: false
                type: boolean
                default: true
            artifacts_pattern:
                description: "Glob pattern for release artifacts (optional)"
                required: false
                type: string
            update_badge_file:
                description: "File to update version badge in (e.g., README.md)"
                required: false
                type: string
                default: "README.md"
            working_directory:
                description: "Working directory for the workflow"
                required: false
                type: string
                default: "."
        outputs:
            version:
                description: "The version that was released"
                value: ${{ jobs.release.outputs.version }}
            release_url:
                description: "URL of the created release"
                value: ${{ jobs.release.outputs.release_url }}

permissions:
    contents: write
    pull-requests: write

jobs:
    release:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ inputs.new_version }}
            release_url: ${{ steps.create_release.outputs.html_url }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Change to working directory
              if: inputs.working_directory != '.'
              run: cd ${{ inputs.working_directory }}

            - name: Download changelog artifact
              if: inputs.changelog_artifact_name != ''
              uses: actions/download-artifact@v4
              with:
                  name: ${{ inputs.changelog_artifact_name }}
                  path: ${{ inputs.working_directory }}

            - name: Download release artifacts
              if: inputs.artifacts_pattern != ''
              uses: actions/download-artifact@v4
              with:
                  name: release-binaries
                  path: ${{ inputs.working_directory }}/dist/
              continue-on-error: true

            - name: Create changelog file
              id: changelog
              working-directory: ${{ inputs.working_directory }}
              run: |
                  NEW_VERSION="${{ inputs.new_version }}"
                  CHANGELOG_FILE="changelog-${NEW_VERSION}.md"

                  # Create changelog file from input content
                  cat > "${CHANGELOG_FILE}" << 'EOF'
                  ${{ inputs.changelog_content }}
                  EOF

                  echo "changelog_file=${CHANGELOG_FILE}" >> $GITHUB_OUTPUT
                  echo "Created changelog file: ${CHANGELOG_FILE}"

            - name: Create and push tag
              working-directory: ${{ inputs.working_directory }}
              run: |
                  NEW_VERSION="${{ inputs.new_version }}"
                  git tag -a "${NEW_VERSION}" -m "Release ${NEW_VERSION}"
                  git push origin "${NEW_VERSION}"

            - name: Create and push moving version tags
              working-directory: ${{ inputs.working_directory }}
              run: |
                  NEW_VERSION="${{ inputs.new_version }}"

                  # Extract version components (remove 'v' prefix if present)
                  VERSION_NUMBERS=${NEW_VERSION#v}
                  IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION_NUMBERS}"

                  # Create major version tag (e.g., v0 for v0.1.9)
                  MAJOR_TAG="v${MAJOR}"
                  echo "Creating/updating major version tag: ${MAJOR_TAG}"
                  git tag -f -a "${MAJOR_TAG}" -m "Latest ${MAJOR}.x.x release: ${NEW_VERSION}"
                  git push -f origin "${MAJOR_TAG}"

                  # Create minor version tag (e.g., v0.1 for v0.1.9)
                  MINOR_TAG="v${MAJOR}.${MINOR}"
                  echo "Creating/updating minor version tag: ${MINOR_TAG}"
                  git tag -f -a "${MINOR_TAG}" -m "Latest ${MAJOR}.${MINOR}.x release: ${NEW_VERSION}"
                  git push -f origin "${MINOR_TAG}"

                  echo "✅ Created moving version tags:"
                  echo "  - ${NEW_VERSION} (specific version)"
                  echo "  - ${MINOR_TAG} (latest ${MAJOR}.${MINOR}.x)"
                  echo "  - ${MAJOR_TAG} (latest ${MAJOR}.x.x)"

            - name: Create release
              id: create_release
              if: inputs.create_release == true
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.new_version }}
                  name: Release ${{ inputs.new_version }}
                  body_path: ${{ inputs.working_directory }}/${{ steps.changelog.outputs.changelog_file }}
                  files: ${{ inputs.artifacts_pattern }}
                  draft: ${{ inputs.draft }}
                  prerelease: ${{ inputs.prerelease }}
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Update version badge
              if: inputs.update_badge_file != ''
              working-directory: ${{ inputs.working_directory }}
              run: |
                  NEW_VERSION="${{ inputs.new_version }}"
                  BADGE_FILE="${{ inputs.update_badge_file }}"

                  # Update version badge if it exists
                  if [ -f "${BADGE_FILE}" ] && grep -q "version-.*-blue" "${BADGE_FILE}"; then
                    sed -i "s/version-.*-blue/version-${NEW_VERSION#v}-blue/g" "${BADGE_FILE}"
                    
                    # Commit and push if changes were made
                    if git diff --quiet "${BADGE_FILE}"; then
                      echo "No changes to ${BADGE_FILE}"
                    else
                      git add "${BADGE_FILE}"
                      git commit -m "docs: update version badge to ${NEW_VERSION}"
                      git push origin main
                    fi
                  fi

            - name: Summary
              run: |
                  NEW_VERSION="${{ inputs.new_version }}"
                  if [ "${{ inputs.create_release }}" = "true" ]; then
                    echo "🎉 Successfully released ${NEW_VERSION}!"
                    echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${NEW_VERSION}"
                  else
                    echo "🏷️ Successfully tagged ${NEW_VERSION}!"
                    echo "Changelog: ${{ steps.changelog.outputs.changelog_file }}"
                  fi
