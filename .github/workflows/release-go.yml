# Release Go image — builds the linux/amd64 Docker image and pushes it to
# ghcr.io/jedwards1230/lilbro-whisper tagged with the release version.
# Called by release.yml or dispatched directly.

name: Release Go Server

run-name: "Release Go ${{ inputs.version_override || format('{0} bump', inputs.bump_type) }}"

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      version_override:
        description: "Override version (e.g. 1.2.3) — ignores bump_type"
        required: false
        type: string
  workflow_call:
    inputs:
      bump_type:
        type: string
        default: "patch"
      version_override:
        type: string
        default: ""

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  tag:
    name: Tag Version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'go-v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1 || true)

          if [ -z "$LATEST_TAG" ]; then
            MAJOR=0; MINOR=0; PATCH=0
            echo "No existing go-v tags, starting from 0.0.0"
          else
            LATEST_VERSION="${LATEST_TAG#go-v}"
            MAJOR=$(echo "$LATEST_VERSION" | cut -d. -f1)
            MINOR=$(echo "$LATEST_VERSION" | cut -d. -f2)
            PATCH=$(echo "$LATEST_VERSION" | cut -d. -f3)
            echo "Latest tag: $LATEST_TAG"
          fi

          OVERRIDE="${{ inputs.version_override }}"
          if [ -n "$OVERRIDE" ]; then
            if ! echo "$OVERRIDE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version format '$OVERRIDE'. Expected: X.Y.Z"
              exit 1
            fi
            NEXT_VERSION="$OVERRIDE"
          else
            case "${{ inputs.bump_type }}" in
              major) NEXT_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi

          NEXT_TAG="go-v${NEXT_VERSION}"

          if git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $NEXT_TAG already exists"
            exit 1
          fi

          echo "version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NEXT_TAG}" >> $GITHUB_OUTPUT
          echo "Next: $NEXT_VERSION (tag: $NEXT_TAG)"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Go server ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

  test:
    name: Test
    needs: [tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.tag }}
      - uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod
      - name: Test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...

  build:
    name: Build & Push Image
    needs: [tag, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.tag.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            VERSION=${{ needs.tag.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=go
          cache-to: type=gha,mode=max,scope=go

  release:
    name: GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        run: |
          gh release create "${{ needs.tag.outputs.tag }}" \
            --title "Go Server ${{ needs.tag.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Write summary
        run: |
          echo "## Released Go Server ${{ needs.tag.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ needs.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`ghcr.io/${{ github.repository }}:${{ needs.tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
