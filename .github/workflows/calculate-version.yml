name: Calculate Version

on:
  workflow_call:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: string
        default: 'patch'
      custom_version:
        description: 'Custom version (optional, overrides version_type)'
        required: false
        type: string
      working_directory:
        description: 'Working directory for the workflow'
        required: false
        type: string
        default: '.'
    outputs:
      current_version:
        description: 'The current version before bumping'
        value: ${{ jobs.calculate.outputs.current_version }}
      new_version:
        description: 'The new version that was calculated'
        value: ${{ jobs.calculate.outputs.new_version }}
      changelog:
        description: 'Path to the generated changelog file'
        value: ${{ jobs.calculate.outputs.changelog }}
      changelog_content:
        description: 'Content of the generated changelog'
        value: ${{ jobs.calculate.outputs.changelog_content }}

permissions:
  contents: read

jobs:
  calculate:
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.current_version.outputs.current_version }}
      new_version: ${{ steps.new_version.outputs.new_version }}
      changelog: ${{ steps.changelog.outputs.changelog_file }}
      changelog_content: ${{ steps.changelog.outputs.changelog_content }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Change to working directory
      if: inputs.working_directory != '.'
      run: cd ${{ inputs.working_directory }}

    - name: Get current version
      id: current_version
      working-directory: ${{ inputs.working_directory }}
      run: |
        # Get the latest tag, or default to v0.0.0 if no tags exist
        # Sort by version to get the most recent semantic version tag
        CURRENT_VERSION=$(git tag --list --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")
        echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
        echo "Current version: ${CURRENT_VERSION}"

    - name: Calculate new version
      id: new_version
      working-directory: ${{ inputs.working_directory }}
      run: |
        CURRENT_VERSION="${{ steps.current_version.outputs.current_version }}"
        CUSTOM_VERSION="${{ inputs.custom_version }}"
        VERSION_TYPE="${{ inputs.version_type }}"
        
        if [ -n "${CUSTOM_VERSION}" ]; then
          # Use custom version if provided
          NEW_VERSION="${CUSTOM_VERSION}"
          # Ensure it starts with 'v'
          if [[ ! "${NEW_VERSION}" =~ ^v ]]; then
            NEW_VERSION="v${NEW_VERSION}"
          fi
        else
          # Parse current version (remove 'v' prefix)
          VERSION_NUMBERS=${CURRENT_VERSION#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION_NUMBERS}"
          
          # Default to 0 if parsing fails
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          
          # Increment based on type
          case "${VERSION_TYPE}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
        fi
        
        echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "New version: ${NEW_VERSION}"

    - name: Generate changelog
      id: changelog
      working-directory: ${{ inputs.working_directory }}
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        CURRENT_VERSION="${{ steps.current_version.outputs.current_version }}"
        NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
        
        echo "Generating changelog from ${CURRENT_VERSION} to ${NEW_VERSION}"
        
        # Get commits since last tag
        if [ "${CURRENT_VERSION}" = "v0.0.0" ]; then
          # First release - get all commits
          COMMITS=$(git log --pretty=format:"- %s" --no-merges)
        else
          # Get commits since last tag
          COMMITS=$(git log ${CURRENT_VERSION}..HEAD --pretty=format:"- %s" --no-merges)
        fi
        
        # Create changelog
        CHANGELOG_FILE="changelog-${NEW_VERSION}.md"
        echo "## What's Changed" > "${CHANGELOG_FILE}"
        echo "" >> "${CHANGELOG_FILE}"
        echo "${COMMITS}" >> "${CHANGELOG_FILE}"
        echo "" >> "${CHANGELOG_FILE}"
        echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${CURRENT_VERSION}...${NEW_VERSION}" >> "${CHANGELOG_FILE}"
        
        # Also output content for other workflows to use
        CHANGELOG_CONTENT=$(cat "${CHANGELOG_FILE}")
        
        echo "changelog_file=${CHANGELOG_FILE}" >> $GITHUB_OUTPUT
        # Use multiline output for changelog content
        echo "changelog_content<<EOF" >> $GITHUB_OUTPUT
        echo "${CHANGELOG_CONTENT}" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Upload changelog artifact
      uses: actions/upload-artifact@v4
      with:
        name: changelog-${{ steps.new_version.outputs.new_version }}
        path: ${{ inputs.working_directory }}/${{ steps.changelog.outputs.changelog_file }}
        retention-days: 1

    - name: Summary
      run: |
        echo "📊 Version Calculation Complete:"
        echo "  Current: ${{ steps.current_version.outputs.current_version }}"
        echo "  New: ${{ steps.new_version.outputs.new_version }}"
        echo "  Changelog: ${{ steps.changelog.outputs.changelog_file }}"