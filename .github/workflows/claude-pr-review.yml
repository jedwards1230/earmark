# Claude PR review — calls the shared reusable workflow in
# jedwards1230/release-workflows, which runs claude-code-action@v1 in Haiku
# PR-review mode with the public jedwards1230-plugins marketplace + review-team
# plugin enabled by default. The focus below is appended to the base prompt.
name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  actions: read
  pull-requests: write
  id-token: write

jobs:
  review:
    uses: jedwards1230/release-workflows/.github/workflows/claude-pr-review.yml@v1
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      draft_on_blocking: true
      extra_plugins: |
        go-quality@jedwards1230-plugins
      focus: |
        earmark is a Go service: indexes audiobook transcripts into a
        CNPG Postgres (pgvector + pg_trgm) and serves semantic search over MCP.
        - SQL: parameterized queries only via pgx — no string-concatenated SQL.
          Use *pgxpool.Pool, never a raw *pgx.Conn.
        - MCP stdio transport: all diagnostics must go to stderr, never stdout
          (stdout is reserved for JSON-RPC).
        - Embeddings/Ollama client + worker: error handling, stale-job timeout
          SQL correctness (integer-seconds interval).
        - The DEBUG_DB_RESET double-confirmation guard must stay intact.
        - When the diff touches Go, prioritize the go-quality:go-reviewer agent for language-specific Go review.
        Do NOT re-flag golangci-lint findings — CI already owns those.
