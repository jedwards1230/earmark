# Auto-release — fires when a PR is merged to main carrying a semver:* label.
# Reads the label from the merged PR and calls release.yml with the appropriate
# bump type.  Use workflow_dispatch for dry-run testing.

name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — compute version but do not tag or release"
        type: boolean
        default: true
      bump_type:
        description: "Bump type (used when no semver label is found)"
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  detect-label:
    name: Detect semver label
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.label.outputs.bump_type }}
      should_release: ${{ steps.label.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect semver label from merged PR
        id: label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # On workflow_dispatch use the provided bump_type input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump_type=${{ inputs.bump_type }}" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find the PR that triggered this push.
          COMMIT_SHA="${{ github.sha }}"
          PR_NUMBER=$(gh pr list --state merged --search "${COMMIT_SHA}" --json number --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -z "$PR_NUMBER" ]; then
            echo "No merged PR found for commit ${COMMIT_SHA} — skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || true)

          if echo "$LABELS" | grep -q "semver:major"; then
            echo "bump_type=major" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "semver:minor"; then
            echo "bump_type=minor" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "semver:patch"; then
            echo "bump_type=patch" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "No semver:* label found on PR #${PR_NUMBER} — skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  release:
    name: Trigger Release
    needs: detect-label
    if: |
      needs.detect-label.outputs.should_release == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
    uses: ./.github/workflows/release.yml
    with:
      release_go: true
      go_bump_type: ${{ needs.detect-label.outputs.bump_type }}
      release_chart: true
      chart_bump_type: ${{ needs.detect-label.outputs.bump_type }}
