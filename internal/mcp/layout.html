<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>earmark — {{.Title}}</title>
<script src="/static/htmx.min.js"></script>
<style>
  :root {
    /* ── surfaces: a 3-layer system (page → card → nested) ─────────────── */
    --bg: #0f1117;
    --surface-1: #1a1d27;   /* cards, tables, panels (primary content layer) */
    --surface-2: #12141c;   /* nested/recessed rows (family headers, banding) */
    --row-band: #181b24;    /* zebra banding on alternate table rows */
    /* back-compat alias: --surface == --surface-1 (old rules still resolve) */
    --surface: var(--surface-1);
    --surface2: var(--surface-2);
    --border: #2f3343;      /* slightly lighter than the old #2a2d3a so rows de-fuse */

    /* ── text: 3 weights, all ≥ WCAG AA (4.5:1) on --surface-1 ─────────── */
    --text:   #e2e4ed;      /* primary content (13.3:1) */
    --text-2: #b6bacb;      /* secondary real content — was the overworked --muted (8.7:1) */
    --muted:  #9094a8;      /* true de-emphasis only: labels, timestamps (5.6:1, AA) */

    /* ── semantic hues (kept — the palette tested well) ────────────────── */
    --green:  #4ade80;
    --yellow: #facc15;
    --red:    #f87171;
    --blue:   #60a5fa;
    --purple: #c084fc;
    --amber:  #fb923c;

    /* ── one filled primary action per page ────────────────────────────── */
    --accent: #2563eb;      /* white label on it = 5.2:1 (AA) */
    --accent-text: #ffffff;
    --focus: #60a5fa;       /* focus-visible ring */

    /* ── fonts: sans for UI/prose, mono reserved for data cells/timestamps */
    --font-ui: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-mono: ui-monospace, "Cascadia Code", "Fira Code", "SFMono-Regular", Menlo, monospace;

    /* ── type scale (rem; real text floored at 13px = .8125rem) ────────── */
    --fs-xs:  .6875rem;  /* 11px — badges, eyebrow labels (color-only never used alone) */
    --fs-sm:  .8125rem;  /* 13px — secondary text floor */
    --fs-base: .875rem;  /* 14px — body */
    --fs-md:  1rem;      /* 16px */
    --fs-lg:  1.25rem;   /* 20px — section/page headings */
    --fs-xl:  1.5rem;    /* 24px — overview card values */
    --fs-2xl: 2rem;      /* 32px — hero numbers */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: var(--fs-base);
    line-height: 1.55;
  }
  a { color: inherit; text-decoration: none; }

  /* Single focus-visible rule for every interactive element (2.4.7). Replaces the
     scattered per-control :focus-visible declarations below. */
  :where(a, button, input, select, textarea, summary, [tabindex]):focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ── top bar / nav ─────────────────────────────────────────────── */
  .topbar {
    display: flex; align-items: center; gap: 24px;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
    flex-wrap: wrap;
  }
  .brand { font-weight: 700; font-size: var(--fs-md); }
  .nav { display: flex; gap: 6px; }
  .nav a {
    display: inline-flex; align-items: center; min-height: 36px;
    padding: 6px 12px; border-radius: 6px; color: var(--text-2);
    font-size: var(--fs-sm); border: 1px solid transparent;
  }
  .nav a:hover { color: var(--text); border-color: var(--border); }
  .nav a.active { color: var(--blue); border-color: var(--blue); background: #15233a; }
  /* topbar phase + paused badge: read-only state surfaced on every page, links
     to the Pipeline page where the live controls live (D2). */
  .topbar-phase { margin-left: auto; display: inline-flex; gap: 6px; align-items: center; }
  .phase-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: var(--fs-xs); font-weight: 600; letter-spacing: 0.04em;
    padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-2);
    white-space: nowrap;
  }
  .phase-badge .phase-ico { font-size: var(--fs-sm); line-height: 1; }
  .phase-badge.phase-idle       { border-color: var(--border); color: var(--muted); }
  .phase-badge.phase-transcribe { border-color: var(--blue);  color: var(--blue); }
  .phase-badge.phase-analyze    { border-color: var(--purple); color: var(--purple); }
  .phase-badge.phase-paused     { border-color: var(--amber); color: var(--amber); }
  main { padding: 24px; max-width: 1400px; }

  h1 { font-size: var(--fs-lg); font-weight: 700; margin-bottom: 4px; }
  /* one-line "what is this page" subtitle (Library + Pipeline) */
  .subtitle { color: var(--text-2); margin-bottom: 20px; font-size: var(--fs-sm); }
  .updated { color: var(--muted); font-size: var(--fs-xs); margin-bottom: 12px; }

  /* ── stat cards ────────────────────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }
  /* labelled clusters of stat cards (transcription vs embedding) */
  .card-group { margin-bottom: 16px; }
  .group-label {
    font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 8px;
  }
  .card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  .card-label { color: var(--text-2); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.08em; }
  .card-value { font-size: var(--fs-xl); font-weight: 700; margin-top: 4px; font-family: var(--font-mono); }
  .card-value.green  { color: var(--green); }
  .card-value.yellow { color: var(--yellow); }
  .card-value.red    { color: var(--red); }
  .card-value.blue   { color: var(--blue); }
  .card-value.purple { color: var(--purple); }
  .card-value.amber  { color: var(--amber); }
  .card-click { cursor: pointer; transition: border-color 0.12s; min-height: 44px; }
  .card-click:hover { border-color: var(--blue); }

  /* ── home status-overview band (Phase 2) ───────────────────────────────
     leads the home page so "is everything okay?" answers in one glance; the
     library table is demoted below it. */
  .overview { margin-bottom: 22px; }
  .ov-cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px; margin-bottom: 12px;
  }
  .ov-card {
    display: flex; flex-direction: column; gap: 4px;
    background: var(--surface-1); border: 1px solid var(--border);
    border-left: 3px solid var(--border); border-radius: 8px;
    padding: 14px 16px; min-height: 44px; transition: border-color 0.12s;
  }
  a.ov-card:hover { border-color: var(--blue); border-left-color: var(--blue); }
  .ov-card.accent-green  { border-left-color: var(--green); }
  .ov-card.accent-blue   { border-left-color: var(--blue); }
  .ov-card.accent-amber  { border-left-color: var(--amber); }
  .ov-card.accent-red    { border-left-color: var(--red); }
  .ov-card.accent-purple { border-left-color: var(--purple); }
  .ov-label { color: var(--text-2); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.08em; }
  .ov-value { font-size: var(--fs-2xl); font-weight: 700; font-family: var(--font-mono); line-height: 1.1; }
  .ov-value.green  { color: var(--green); }
  .ov-value.red    { color: var(--red); }
  .ov-value.blue   { color: var(--blue); }
  .ov-value.amber  { color: var(--amber); }
  .ov-value.purple { color: var(--purple); }
  .ov-glyph { font-size: var(--fs-md); margin-right: 4px; }
  .ov-sub { color: var(--muted); font-size: var(--fs-xs); }
  /* plain-language phase line under the cards */
  .ov-phase-line {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; font-size: var(--fs-sm); color: var(--text-2);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .ov-phase-line.attn { border-color: var(--red); color: var(--text); }
  .ov-phase-line .ov-phase-ico { font-size: var(--fs-md); }
  /* needs-attention strip (failed books / unreviewed high-conf findings) */
  .ov-attn {
    margin-top: 10px; background: #2a0a0a; border: 1px solid var(--red);
    border-radius: 8px; padding: 10px 16px; font-size: var(--fs-sm); color: var(--text);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .ov-attn .ov-attn-ico { color: var(--red); font-size: var(--fs-md); }
  .ov-attn a { color: var(--red); text-decoration: underline; }
  .ov-attn.attn-soft { background: #2a1c08; border-color: var(--amber); }
  .ov-attn.attn-soft .ov-attn-ico, .ov-attn.attn-soft a { color: var(--amber); }

  /* ── pipeline status / control ─────────────────────────────────── */
  .pipeline {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    flex-wrap: wrap; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 18px; margin-bottom: 20px;
  }
  .pipeline.state-paused  { border-color: var(--amber); }
  .pipeline.state-idle    { border-color: var(--border); }
  .pipeline.state-running { border-color: var(--green); }
  .pipeline.state-stalled { border-color: var(--red); }
  .pipe-main { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .pipe-label { font-weight: 700; letter-spacing: 0.06em; font-size: var(--fs-md); }
  .state-running .pipe-label { color: var(--green); }
  .state-paused  .pipe-label { color: var(--amber); }
  .state-idle    .pipe-label { color: var(--blue); }
  .state-stalled .pipe-label { color: var(--red); }
  .pipe-sub { color: var(--muted); font-size: var(--fs-sm); }
  .pipe-meta { color: var(--muted); font-size: var(--fs-xs); margin-top: 4px; width: 100%; }
  /* honest "disabled" affordance: shown where a control would be when no
     CONTROL_API_TOKEN is configured, so the page never offers a button that
     would fail-close (503) on click. */
  .ctrl-disabled { color: var(--muted); font-size: var(--fs-sm); font-style: italic; cursor: help; }
  /* in-status-fragment phase badge sits inline with the state label */
  .pipe-main .phase-badge { align-self: center; }

  /* ── run-budget controls (Pipeline page) ───────────────────────── */
  .run-budget {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 18px; margin-bottom: 20px;
  }
  .rb-state { display: flex; align-items: baseline; gap: 8px; }
  .rb-label { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .rb-value { font-size: var(--fs-sm); font-weight: 600; }
  .rb-form { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .rb-form input[type=number] {
    width: 80px; min-height: 40px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px; padding: 6px 8px; font: inherit; font-size: var(--fs-sm);
  }

  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .dot.green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  .dot.yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .dot.amber  { background: var(--amber);  box-shadow: 0 0 6px var(--amber); }
  .dot.blue   { background: var(--blue);   box-shadow: 0 0 6px var(--blue); }
  .dot.red    { background: var(--red);    box-shadow: 0 0 6px var(--red); }
  .dot.grey   { background: var(--muted); }

  /* ── buttons ───────────────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 36px;
    background: var(--surface-1); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 14px; font-family: var(--font-ui); font-size: var(--fs-sm); cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--blue); color: var(--blue); }
  .btn.htmx-request { opacity: 0.5; pointer-events: none; }
  .btn-go:hover   { border-color: var(--green); color: var(--green); }
  .btn-warn:hover { border-color: var(--amber); color: var(--amber); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  /* one filled primary action per page (Resume pipeline / run N / run eval) */
  .btn-primary {
    background: var(--accent); color: var(--accent-text);
    border-color: var(--accent); font-weight: 600; min-height: 44px;
  }
  .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; color: var(--accent-text); }

  /* ── tables ────────────────────────────────────────────────────── */
  .section { margin-bottom: 24px; }
  .section-title { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; }
  .table-wrap { background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  caption { caption-side: top; text-align: left; font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 10px 14px 0; }
  th { text-align: left; font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); padding: 10px 14px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  /* row banding so dense tables de-fuse (1.4.x readability) */
  tbody tr:nth-child(even) td { background: var(--row-band); }
  /* clickable rows: legacy <tr class=clickable> AND the new whole-row <a> pattern */
  tbody tr.clickable:hover td { background: #1e2230; cursor: pointer; }
  tbody tr.row-link:hover td { background: #1e2230; }
  /* a whole-row link: the <a> fills the cell so keyboard/focus + click both work */
  td .row-a { display: block; color: inherit; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: var(--fs-xs); font-weight: 600; }
  .badge.pending  { background: #2a2a3a; color: var(--blue); }
  .badge.claimed  { background: #2a2a1a; color: var(--yellow); }
  .badge.done     { background: #0a2a1a; color: var(--green); }
  .badge.failed   { background: #2a0a0a; color: var(--red); }
  /* status badge with a leading glyph so state is never color-only (1.4.1) */
  .badge .badge-ico { margin-right: 3px; }
  .file-name { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 420px; }
  /* data cells / timestamps use the mono font; everything else is sans */
  .time-muted { color: var(--muted); font-size: var(--fs-sm); }
  .mono, td.num, .seg-time, .card-value, .ov-value { font-family: var(--font-mono); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  /* error-row: a <details> expander so the full traceback is readable on demand
     instead of being clamped and hidden. */
  .error-row { margin-top: 4px; font-size: var(--fs-sm); }
  .error-row > summary { color: var(--red); cursor: pointer; list-style: revert; min-height: 28px; }
  .error-row > pre { color: var(--red); white-space: pre-wrap; word-break: break-word; margin-top: 4px; font-family: var(--font-mono); font-size: var(--fs-sm); }
  .actions { text-align: right; white-space: nowrap; }

  /* overview backfill progress bar */
  .overview-progress { margin-bottom: 20px; }
  .op-bar { height: 8px; background: #2a2a3a; border-radius: 4px; overflow: hidden; }
  .op-fill { height: 100%; background: var(--green); }
  .op-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 6px; color: var(--text-2); font-size: var(--fs-sm); }
  .op-main { color: var(--text); font-weight: 600; }

  /* ── callouts ──────────────────────────────────────────────────── */
  .stall-callout { background: #2a1c08; color: var(--amber); border: 1px solid var(--amber); border-radius: 6px; padding: 8px 14px; margin-bottom: 20px; font-size: var(--fs-sm); line-height: 1.5; }
  .failed-callout { margin-top: 10px; color: var(--red); font-size: var(--fs-sm); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .conn-lost { background: #2a0a0a; color: var(--red); border: 1px solid var(--red); border-radius: 6px; padding: 8px 14px; margin-bottom: 16px; font-size: var(--fs-sm); }
  #action-error:empty { display: none; }
  .action-err { background: #2a0a0a; color: var(--red); border: 1px solid var(--red); border-radius: 6px; padding: 8px 14px; margin-bottom: 16px; font-size: var(--fs-sm); animation: action-err-fade 0.5s ease 6s forwards; }
  @keyframes action-err-fade { to { opacity: 0; height: 0; padding: 0; margin: 0; border-width: 0; overflow: hidden; } }
  @media (prefers-reduced-motion: reduce) { .action-err { animation: none; } }
  .htmx-indicator { color: var(--muted); font-size: var(--fs-xs); }

  /* ── library controls ──────────────────────────────────────────── */
  .lib-bar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
  .lib-search { display: flex; align-items: center; gap: 8px; }
  .lib-search input[type=search] { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 5px; padding: 6px 10px; font: inherit; font-size: var(--fs-sm); min-width: 220px; }
  .lib-clear { color: var(--muted); font-size: var(--fs-sm); cursor: pointer; text-decoration: underline; }
  .lib-clear:hover { color: var(--text); }
  .lib-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { cursor: pointer; font-size: var(--fs-sm); padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); user-select: none; }
  .chip:hover { border-color: var(--blue); color: var(--text); }
  .chip.active { border-color: var(--blue); color: var(--blue); background: #15233a; }
  .chip-sep { color: var(--border); user-select: none; align-self: center; }
  .chip-findings { color: var(--amber); border-color: var(--border); }
  .chip-findings:hover { border-color: var(--amber); color: var(--amber); }
  .chip-findings.active { border-color: var(--amber); color: var(--amber); background: #2a1c08; }
  .lib-sort { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .lib-sort-label { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .progress { display: inline-block; vertical-align: middle; width: 90px; height: 7px; background: #2a2a3a; border-radius: 4px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--green); }
  .progress-bar.has-failed { background: linear-gradient(90deg, var(--green), var(--amber)); }
  .progress-text { color: var(--muted); font-size: var(--fs-sm); margin-left: 8px; }
  .findings-link { color: var(--amber); }
  .findings-link:hover { text-decoration: underline; }
  .mini-badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .mini-badges .badge { font-size: var(--fs-xs); }
  .lib-pager { display: flex; align-items: center; gap: 14px; margin-top: 12px; }
  .lib-meta { color: var(--muted); font-size: var(--fs-sm); }
  .lib-empty { color: var(--muted); padding: 12px 2px; }

  /* ── book detail ───────────────────────────────────────────────── */
  .book-head { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; margin-bottom: 18px; }
  .book-title { font-size: var(--fs-lg); font-weight: 700; }
  .book-author { color: var(--purple); font-size: var(--fs-sm); margin-top: 2px; }
  .book-stats { color: var(--muted); font-size: var(--fs-sm); margin-top: 8px; display: flex; gap: 14px; flex-wrap: wrap; }
  .book-actions { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .eval-disabled { color: var(--muted); font-size: var(--fs-sm); }
  .eval-disabled a { color: var(--blue); }
  .eval-notice { background: #0a1a2a; color: var(--blue); border: 1px solid var(--blue); border-radius: 6px; padding: 8px 14px; margin-top: 12px; font-size: var(--fs-sm); }
  .findings-actions { margin-bottom: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
  .back-link { color: var(--muted); font-size: var(--fs-sm); display: inline-block; margin-bottom: 12px; }
  .back-link:hover { color: var(--text); }
  .book-path { color: var(--muted); font-size: var(--fs-xs); margin-top: 6px; word-break: break-all; }

  /* ── pipeline panel (book detail): two real bars + honest judge chip ─ */
  .pipeline-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin-bottom: 18px; }
  .pipeline-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .pipeline-label { width: 84px; font-size: var(--fs-sm); color: var(--muted); flex: none; }
  .pipeline-row .progress { width: 160px; }
  .judge-chip { display: inline-block; font-size: var(--fs-sm); padding: 2px 10px; border-radius: 999px; border: 1px solid var(--amber); color: var(--amber); }
  .judge-chip.judge-clean { border-color: var(--border); color: var(--muted); }

  /* ── track detail: 3-panel header, kv lists, transcript reader ──── */
  .panels { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .panel-title { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; }
  dl.kv { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; }
  dl.kv dt { color: var(--muted); font-size: var(--fs-sm); }
  dl.kv dd { margin: 0; font-size: var(--fs-sm); text-align: right; word-break: break-word; }
  .reader { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; max-height: 60vh; overflow-y: auto; line-height: 1.55; }
  .seg { margin-bottom: 8px; font-size: var(--fs-sm); }
  .seg-time { color: var(--muted); font-size: var(--fs-xs); font-variant-numeric: tabular-nums; margin-right: 6px; }
  .seg-speaker { color: var(--purple); font-size: var(--fs-xs); margin-right: 6px; }
  .seg-text { color: var(--text); }
  /* deep-jump target: the segment a finding "Where" link scrolled to */
  .seg.seg-active { background: #15233a; border-left: 3px solid var(--blue); padding-left: 8px; border-radius: 4px; }
  .load-more { margin-top: 10px; }

  /* ── servers page ──────────────────────────────────────────────── */
  .server-card { border-left: 3px solid var(--border); }
  .server-card.state-running { border-left-color: var(--green); }
  .server-card.state-busy    { border-left-color: var(--amber); }
  .server-card.state-stalled { border-left-color: var(--red); }
  .server-card.state-offline { border-left-color: var(--muted); }
  .server-card.state-idle    { border-left-color: var(--blue); }
  .server-card.state-unknown { border-left-color: var(--muted); }
  .server-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .server-name { font-weight: 700; font-size: var(--fs-base); }
  .server-state { font-size: var(--fs-sm); font-weight: 700; letter-spacing: 0.06em; }
  .server-state.state-running { color: var(--green); }
  .server-state.state-busy    { color: var(--amber); }
  .server-state.state-stalled { color: var(--red); }
  .server-state.state-offline { color: var(--muted); }
  .server-state.state-idle    { color: var(--blue); }
  .server-state.state-unknown { color: var(--muted); }
  .server-sub { color: var(--muted); font-size: var(--fs-sm); margin-top: 2px; word-break: break-word; }
  .server-host { color: var(--muted); font-size: var(--fs-xs); margin-top: 6px; }
  .badge.role-primary  { background: #0a2a1a; color: var(--green); }
  .badge.role-fallback { background: #15233a; color: var(--blue); }
  .badge.unconfigured  { background: #2a2a1a; color: var(--amber); }
  /* AI endpoint type badges (Models/Services page) */
  .badge.role-embeddings { background: #15233a; color: var(--blue); }
  .badge.role-chat       { background: #2a1a2a; color: #c08fd9; }
  .server-note { color: var(--muted); font-size: var(--fs-xs); line-height: 1.5; margin-top: 16px; max-width: 760px; }
  /* per-family grouping header inside the Models & modes table */
  .family-row td { background: var(--surface2); padding: 6px 12px; }
  .family-label { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.06em; color: var(--purple); font-weight: 600; }
  .family-known { color: var(--purple); }
  /* capability strip: applied (green), declined/absent (amber, ✗ + reason tooltip) */
  .cap-strip { display: inline-flex; gap: 4px; flex-wrap: wrap; }
  .cap-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: var(--fs-xs); font-weight: 600; font-family: inherit; white-space: nowrap; }
  .cap-badge.cap-on  { background: #0a2a1a; color: var(--green); }
  .cap-badge.cap-off { background: #2a1c08; color: var(--amber); cursor: help; }
  .server-note code.cap-badge { font-size: var(--fs-xs); }

  @media (max-width: 560px) {
    main { padding: 14px; }
    .file-name { max-width: 50vw; }
    th, td { padding: 10px 8px; }
    /* 44px touch targets on the phone (the dashboard is used over LAN, 2.5.8) */
    .btn { padding: 10px 14px; min-height: 44px; }
    .nav a { padding: 9px 12px; min-height: 44px; }
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">earmark</div>
  <nav class="nav">
    <a href="/" class="{{if eq .Nav "library"}}active{{end}}">Library</a>
    <a href="/pipeline" class="{{if eq .Nav "pipeline"}}active{{end}}">Pipeline</a>
    <a href="/servers" class="{{if eq .Nav "servers"}}active{{end}}">Models/Services</a>
    <a href="/findings" class="{{if eq .Nav "findings"}}active{{end}}">Findings</a>
  </nav>
  {{if .PhaseKnown}}
  <a class="topbar-phase" href="/pipeline" title="coordinator phase — read-only (the `earmark batch` coordinator owns it). {{.PhaseReason}} Click for the Pipeline ops page.">
    <span class="phase-badge {{.PhaseClass}}"><span class="phase-ico" aria-hidden="true">{{.PhaseIcon}}</span>phase: {{.Phase}}</span>
    {{if .Paused}}<span class="phase-badge phase-paused" title="paused is a normal resting state — the runner is intentionally not claiming new work"><span class="phase-ico" aria-hidden="true">&#9208;</span>paused</span>{{end}}
  </a>
  {{end}}
</header>
<main>
{{block "content" .}}{{end}}
</main>
</body>
</html>
